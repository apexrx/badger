version: "3.8"

services:
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway" # Maps the special address to your Linux host

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000" # Host:Container
